name: Deploy Backend to SLT VM

on:
  push:
    branches:
      - feat/slt-vm-new
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, backend]

    steps:
      - name: Mark repo as safe
        shell: cmd
        run: git config --global --add safe.directory C:/DQMS-final-backend

      - name: Update backend working copy
        shell: cmd
        run: |
          cd /d C:\DQMS-final-backend
          git fetch origin
          git checkout feat/slt-vm-new
          git reset --hard origin/feat/slt-vm-new

      - name: Stop backend before install
        shell: cmd
        run: |
          C:\Users\Administrator\AppData\Roaming\npm\pm2.cmd stop dqms-backend
          taskkill /F /IM node.exe || exit /b 0

      - name: Clean locked Prisma engine files
        shell: cmd
        run: |
          if exist C:\DQMS-final-backend\node_modules\.prisma\client\query_engine-windows.dll.node del /F /Q C:\DQMS-final-backend\node_modules\.prisma\client\query_engine-windows.dll.node
          del /F /Q C:\DQMS-final-backend\node_modules\.prisma\client\query_engine-windows.dll.node.tmp* 2>nul

      - name: Install dependencies
        shell: cmd
        run: |
          cd /d C:\DQMS-final-backend
          npm install

      - name: Generate Prisma client
        shell: cmd
        run: |
          cd /d C:\DQMS-final-backend
          npx prisma generate

      - name: Run Prisma migrations
        shell: cmd
        run: |
          cd /d C:\DQMS-final-backend
          npx prisma migrate deploy

      - name: Build backend
        shell: cmd
        run: |
          cd /d C:\DQMS-final-backend
          npm run build

      - name: Start backend
        shell: cmd
        run: |
          C:\Users\Administrator\AppData\Roaming\npm\pm2.cmd start dist/server.js --name dqms-backend || C:\Users\Administrator\AppData\Roaming\npm\pm2.cmd restart dqms-backend --update-env